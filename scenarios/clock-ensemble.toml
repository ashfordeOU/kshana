# Monte Carlo ensemble of the clock-holdover scenario.
#
# Identical to clock-holdover.toml but run as many realizations (`runs`), so the
# result is a confidence band rather than a single trajectory: each figure of
# merit is reported as a mean with a 5th-95th-percentile spread, and the error
# chart shades the 5-95% envelope around the median for each clock. This is the
# statistically meaningful view — one run is only a single draw of the noise.
seed = 42
threshold_ns = 20.0
runs = 200

[time]
step_s = 10.0
duration_s = 7200.0

[gnss]
windows = [
  { t0 = 0.0,    t1 = 600.0,  state = "nominal" },
  { t0 = 600.0,  t1 = 7200.0, state = "denied" },
]

[clock_quantum]
id = "optical-sr-lattice"
provenance = "Strontium optical lattice clock, space-oriented goal sigma_y(1s)=1e-15 (Origlia/Schiller/Bongs et al., arXiv:1503.08457); q_wf=sigma_y(1s)^2; ground-demonstrator maturity, not flown; flicker floor modeled at sigma_y=1e-16"
y0   = 5.0e-17
q_wf = 1.0e-30
q_rw = 0.0
flicker_floor = 1.0e-16

[clock_classical]
id = "csac-sa45s"
provenance = "Microchip SA65 / SA.45s CSAC datasheet sigma_y(1s)=3e-10; q_wf=sigma_y(1s)^2; flicker floor modeled at sigma_y=2e-11"
y0   = 5.0e-10
q_wf = 9.0e-20
q_rw = 0.0
flicker_floor = 2.0e-11
