# GNSS availability from a real-format GPS constellation propagated with SGP4/SDP4.
#
# Unlike orbit-real-tle.toml (which reads only line-2 mean elements and propagates
# them two-body), this constellation is given as FULL two-line element sets — a
# line 1 and a line 2 per satellite — so the engine propagates each with the full
# SGP4/SDP4 model (validated against the AIAA 2006-6753 verification vectors in
# tests/sgp4_verification.rs). For a ~12 h GPS orbit that means the deep-space
# lunar-solar and half-day geopotential-resonance terms are included, which the
# two-body + J2-secular model cannot represent.
#
# The elements below are a synthetic GPS-like Walker pattern (6 planes x 4
# satellites, i = 55 deg, e = 0.001, ~2 rev/day) written in the real NORAD/
# Celestrak two-line format with valid checksums and a common epoch. Drop in the
# current "gps-ops" set from celestrak.org to study the actual constellation.
# Vendor-neutral.

kind = "orbit"
seed = 17
threshold_ns = 10.0
mask_deg = 5.0
sigma_uere_m = 1.0

[time]
step_s = 120.0
duration_s = 43200.0   # ~ one GPS revolution

# Low-Earth-orbit user (~500 km), looking up at the MEO constellation.
[user]
altitude_km = 500.0
inclination_deg = 51.6
u0_deg = 0.0

# Real-format full TLEs (line 1 + line 2): a GPS-like MEO constellation.
[constellation]
tle = """
