# Real-observation single-point positioning (SPP) from a surveyed IGS station.
#
# This solves a receiver's position from genuine GNSS measurements: the RINEX 3
# code pseudoranges logged by IGS station ABMF (Aubergine, Le Moule, Guadeloupe)
# on 2018-05-13 at 01:30 GPS, and the GPS broadcast ephemeris for that day. The
# dual-frequency ionosphere-free L1/L2 combination removes the ionosphere; the
# Saastamoinen/Niell model handles the troposphere; an iterated weighted
# least-squares solve recovers position and clock. The result is validated
# against the station's surveyed coordinate (truth_ecef): the engine reports the
# horizontal, vertical, and 3-D error of the fix.
#
# Scope: single-point positioning from broadcast ephemeris (metre-level), not
# carrier-phase PPP/RTK. Vendor-neutral; the data are open IGS products.

