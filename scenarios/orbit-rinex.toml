# GNSS availability from a real RINEX 3 broadcast ephemeris.
#
# The constellation is built directly from a block of RINEX 3 GPS navigation
# records (the broadcast ephemeris a receiver decodes), given inline below. Each
# record becomes a satellite propagated by the IS-GPS-200 user algorithm and
# rotated into the inertial frame, then fed through the same geometry/visibility
# pipeline as any other constellation. Drop in a real `.rnx`/`brdc` NAV file's
# GPS records (e.g. from an IGS station) to study coverage from actual broadcast
# data. This is the standards-interop path: RINEX in, PNT geometry out.
#
# Scope: GPS LNAV broadcast ephemeris only (no Galileo/BeiDou/GLONASS yet); the
# orbit is the broadcast Keplerian+harmonic model, valid for a few hours either
# side of each Toe. Eight GPS satellites are spread over four orbital planes here
# and seen by a low-Earth-orbit user. Vendor-neutral.

kind = "orbit"
seed = 13
threshold_ns = 10.0
mask_deg = 5.0
sigma_uere_m = 1.0

[time]
step_s = 120.0
duration_s = 43200.0   # ~ one GPS revolution

# Low-Earth-orbit user (~500 km), looking up at the MEO constellation.
[user]
altitude_km = 500.0
inclination_deg = 51.6
u0_deg = 0.0

# Real-format RINEX 3 GPS navigation records: eight satellites across four planes.
[constellation]
