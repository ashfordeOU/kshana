<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" width="1200" height="330" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Kshana — the precise instant. Open, reproducible hybrid quantum/classical PNT performance.">
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- eyebrow: Devanagari mark + meaning -->
  <text x="600" y="74" text-anchor="middle" font-size="30" fill="#7c8aa0" font-weight="600">
    <tspan>क्षण</tspan><tspan dx="18" letter-spacing="6">· THE PRECISE INSTANT</tspan>
  </text>

  <!-- wordmark -->
  <text x="600" y="205" text-anchor="middle" font-size="140" font-weight="800" letter-spacing="2" fill="url(#kg)">Kshana</text>

  <!-- accent rule -->
  <rect x="470" y="238" width="260" height="4" rx="2" fill="url(#kg)"/>

  <!-- tagline -->
  <text x="600" y="296" text-anchor="middle" font-size="33" fill="#7c8aa0" font-weight="500">Open, reproducible hybrid quantum / classical PNT performance</text>
</svg>
