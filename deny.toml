[advisories]
version = 2
# Fail (not just warn) if a dependency resolves to a yanked release, so a yanked
# crate cannot silently enter the build.
yanked = "deny"

[licenses]
version = 2
# Dependencies must stay PERMISSIVE. Kshana itself is AGPL-3.0-only and is
# dual-licensed commercially (see LICENSE / LICENSING.md), which is only possible
# while every dependency we redistribute is relicensable under our commercial
# terms — i.e. permissive. A copyleft (GPL/AGPL/LGPL/MPL) dependency would taint
# the commercial edition, so they stay off this list on purpose.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception", # target-lexicon (pyo3 build dependency)
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
]
# AGPL is allowed ONLY for our own crate, not the dependency tree. This lets the
# license gate accept kshana's own AGPL-3.0-only license without opening the door
# to copyleft dependencies (which would break commercial dual-licensing).
exceptions = [
  { name = "kshana", allow = ["AGPL-3.0-only"] },
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
