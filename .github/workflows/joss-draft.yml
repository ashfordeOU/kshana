# Compile the JOSS paper (paper/paper.md) to PDF exactly the way JOSS's editorialbot
# does, using the Open Journals "inara" container. Runs on changes to paper/** and on
# manual dispatch, and uploads the compiled paper.pdf as a build artifact — so you can
# preview the real submission PDF and catch any compile/citation/figure error BEFORE
# submitting (and during review). Read-only; publishes nothing.
name: JOSS draft PDF
on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/joss-draft.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile paper.md -> paper.pdf (JOSS format)
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      - name: Upload the compiled paper
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper-pdf
          path: paper/paper.pdf
          if-no-files-found: error
