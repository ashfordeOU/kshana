name: Release
on:
  push:
    tags: ["v*"]
  # Manual re-trigger for an existing tag (e.g. when a transient runner outage hung
  # the original run). Rebuilds + re-attests the same tag and updates its release,
  # without moving or re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build the release for, e.g. v0.19.0"
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false
jobs:
  verify:
    runs-on: ubuntu-latest
    # No build cache on this job, so a cold compile of fmt/clippy/test can run long;
    # the cap only guards against a stalled/dead runner hanging indefinitely.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      # Pinned to the channel in rust-toolchain.toml so the release build matches CI.
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/check-toolchain.sh
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
      - run: ./scripts/check-reproducible.sh
      - run: ./scripts/check-no-attribution.sh
  release:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      # Required for SLSA build-provenance attestation of the release artifacts.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Build the kshana-mcp server binary
        # The MCP server is a standalone, workspace-excluded crate (edition 2024), so it
        # builds from its own manifest into its own target dir. Attached to the release so
        # users can grab a prebuilt server binary without a Rust toolchain.
        run: cargo build --release --manifest-path mcp/kshana-mcp/Cargo.toml
      - name: Generate the CycloneDX SBOM
        run: ./scripts/gen-sbom.sh > kshana-sbom.cdx.json
      - name: Generate the validation summary
        run: cargo run --release --bin validation_report -- kshana-validation-summary.html
      - name: Generate release notes from CHANGELOG
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: bash scripts/changelog-extract.sh "${TAG#v}" > RELEASE_NOTES.md
      # Cryptographic build provenance (SLSA) for the binary and the SBOM, so a
      # consumer can verify the artifacts were produced by this workflow.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            target/release/kshana
            mcp/kshana-mcp/target/release/kshana-mcp
            kshana-sbom.cdx.json
            kshana-validation-summary.html
      - uses: softprops/action-gh-release@v2
        with:
          # Explicit so a workflow_dispatch run (whose github.ref is the branch) still
          # attaches to the right tag; on a tag push this equals the pushed tag.
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            target/release/kshana
            mcp/kshana-mcp/target/release/kshana-mcp
            kshana-sbom.cdx.json
            kshana-validation-summary.html

  # Post-release verification: pull the assets back DOWN from the just-created GitHub
  # release (i.e. the published bytes, not the in-job build dir) and prove each one
  # carries a valid SLSA build-provenance attestation tied to this repository. This is
  # the consumer's own verification path (`gh attestation verify`), exercised in CI so a
  # broken/un-attested asset is caught immediately rather than by a downstream user.
  verify-release:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # gh attestation verify reads the attestations attached to the repo; the default
      # token with contents:read can read them, so no extra scope is needed.
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag || github.ref_name }}
      REPO: ${{ github.repository }}
    steps:
      - name: Download the published release assets
        run: |
          set -euo pipefail
          mkdir -p verify && cd verify
          # Pull every asset attached to the release for this tag.
          gh release download "$TAG" --repo "$REPO" --clobber
          ls -l
      - name: Verify SBOM is well-formed CycloneDX
        run: |
          set -euo pipefail
          python3 - verify/kshana-sbom.cdx.json <<'PY'
          import json, sys
          with open(sys.argv[1]) as fh:
              doc = json.load(fh)
          assert doc.get("bomFormat") == "CycloneDX", "not a CycloneDX SBOM"
          assert doc.get("specVersion"), "missing specVersion"
          assert isinstance(doc.get("components"), list) and doc["components"], "no components"
          print(f"OK: CycloneDX {doc['specVersion']} with {len(doc['components'])} components")
          PY
      - name: Verify SLSA build-provenance attestation of each binary + SBOM
        run: |
          set -euo pipefail
          cd verify
          for f in kshana kshana-mcp kshana-sbom.cdx.json; do
            if [ -f "$f" ]; then
              echo "== gh attestation verify $f =="
              gh attestation verify "$f" --repo "$REPO"
            else
              echo "::warning::$f not present among release assets — skipping"
            fi
          done
      - name: Smoke-run the verified binary
        # The CLI has no --version flag; run it with no args and assert it executes and
        # prints its usage banner. The documented "no scenario given" exit code is 2, so
        # we check for the banner rather than a zero exit — this proves the downloaded
        # binary runs on a clean runner, not that it parsed a scenario.
        run: |
          set -uo pipefail
          chmod +x verify/kshana
          out="$(verify/kshana 2>&1)" || true
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "usage: kshana" \
            || { echo "::error::binary did not run / print its usage banner"; exit 1; }
          echo "OK: binary runs"
