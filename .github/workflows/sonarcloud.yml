# SPDX-License-Identifier: AGPL-3.0-only
# Analyse the Rust engine on SonarQube Cloud (sonarcloud.io), importing the LCOV
# coverage that ci.yml's `coverage` job already produced for the same commit. The
# Rust analyzer runs Clippy itself; this workflow only hands the source plus the
# downloaded coverage report to the scanner. Configuration (org/project keys,
# sources, coverage path) lives in sonar-project.properties.
#
# Triggered on CI completion (workflow_run) instead of building coverage itself:
# this job used to run its own cargo-tarpaulin pass — a duplicate of ci.yml's
# coverage job costing ~90+ runner-minutes per push — and was cancelled whenever
# the instrumented build outran its timeout cap (180 min on e1a2cb0). The scan
# itself takes single-digit minutes; every cancellation was the duplicated build,
# never the scan. Downloading ci.yml's `coverage-lcov` artifact makes the imported
# coverage byte-identical to the report CI gated at >= 85% and removes the failure
# mode entirely: this workflow now succeeds whenever CI does, and is skipped (not
# failed) when CI fails.
#
# Scope: analyses pushes to main. PR analysis is intentionally not wired: fork PRs
# never had the SONAR_TOKEN secret (the gate below skipped them), so this drops no
# working behaviour.
#
# Gated on the SONAR_TOKEN secret so it stays inert until the maintainer creates the
# SonarCloud project and adds the token (Settings -> Secrets and variables -> Actions).
# NOTE: keep "Automatic Analysis" OFF in the SonarCloud project settings, otherwise it
# conflicts with this CI-based analysis and the coverage import is ignored.
name: SonarQube Cloud

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  # Downloading an artifact from the triggering CI run requires actions:read.
  actions: read

concurrency:
  group: sonarcloud-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: Analyze (Rust + coverage)
    # Analyse main-branch pushes whose CI succeeded: the coverage-lcov artifact only
    # exists when the coverage job passed, and analysing a red commit would be noise.
    # (The push+main condition also keeps this privileged workflow_run context away
    # from any fork-controlled ref.)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    # No Rust build happens here; the scanner alone runs in single-digit minutes.
    timeout-minutes: 30
    steps:
      - name: Gate on SONAR_TOKEN
        id: gate
        env:
          TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "SONAR_TOKEN not set - skipping SonarQube Cloud analysis (inert until the maintainer adds the secret)."
          fi
      - if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@v4
        with:
          # The exact commit the CI run tested, with full history so the scanner can
          # attribute lines (SCM blame) and compute the new-code period accurately.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Download the CI run's coverage report
        if: steps.gate.outputs.go == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage
          run-id: ${{ github.event.workflow_run.id }}
          # Cross-run artifact downloads need an explicit token.
          github-token: ${{ github.token }}
      - name: SonarQube Cloud scan
        if: steps.gate.outputs.go == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
