# SPDX-License-Identifier: AGPL-3.0-only
# Analyse the Rust engine on SonarQube Cloud (sonarcloud.io) and import the LCOV
# coverage that CI already produces. The Rust analyzer runs Clippy itself; this
# workflow only builds the coverage report and hands it, plus the source, to the
# scanner. Configuration (org/project keys, sources, coverage path) lives in
# sonar-project.properties.
#
# Gated on the SONAR_TOKEN secret so it stays inert until the maintainer creates the
# SonarCloud project and adds the token (Settings -> Secrets and variables -> Actions).
# Fork PRs have no secret, so the gate skips them cleanly rather than failing.
# NOTE: turn OFF "Automatic Analysis" in the SonarCloud project settings, otherwise it
# conflicts with this CI-based analysis and the coverage import is ignored.
name: SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: Analyze (Rust + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Gate on SONAR_TOKEN
        id: gate
        env:
          TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "SONAR_TOKEN not set - skipping SonarQube Cloud analysis (inert until the maintainer adds the secret)."
          fi
      - if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@v4
        with:
          # Full history so the scanner can attribute lines (SCM blame) and compute
          # the new-code period accurately.
          fetch-depth: 0
      - if: steps.gate.outputs.go == 'true'
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          # LLVM source-based coverage needs llvm-profdata/llvm-cov.
          components: llvm-tools-preview
      - if: steps.gate.outputs.go == 'true'
        uses: Swatinem/rust-cache@v2
      - if: steps.gate.outputs.go == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Coverage (LLVM engine) to lcov
        if: steps.gate.outputs.go == 'true'
        # Same measurement as ci.yml's coverage job, minus the CI-only fail-under floor
        # (SonarCloud applies its own quality gate; the floor stays enforced in ci.yml).
        run: >
          cargo tarpaulin --engine llvm --out Lcov --output-dir coverage
          --exclude-files 'src/*_data.rs'
          --exclude-files 'src/main.rs'
          --exclude-files 'tests/*'
          --exclude-files 'web/*'
          --timeout 900
      - name: SonarQube Cloud scan
        if: steps.gate.outputs.go == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
