# Build Python wheels for the (optional) extension module. Runs on release tags
# and on manual dispatch only, so the required CI gate on `main` is unaffected.
#
# Covers the full platform-tag matrix the PyPI release ships, including the ARM
# targets (m37c34cfc): linux x86_64 + aarch64 (manylinux_2_28), macOS arm64 +
# x86_64, and Windows x64 + arm64. The Linux aarch64 wheel cross-builds in the
# manylinux container via QEMU. abi3 (cp39-abi3) keeps one wheel per platform
# across Python versions.
#
# Security: no untrusted input is interpolated into any run/step — only trusted
# matrix values (x86_64 / aarch64 / x64) and github.ref — so there is no
# workflow-injection surface.
name: wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wheels:
    name: wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest # macos-14 runner is arm64
            target: aarch64
          # Cross-build the Intel wheel on the arm64 runner instead of a (scarce,
          # deprecating) macos-13 Intel runner that can queue indefinitely. maturin
          # adds the x86_64-apple-darwin target; the abi3 wheel cross-compiles cleanly.
          - os: macos-latest
            target: x86_64
          - os: windows-latest
            target: x64
          # Windows ARM64 builds natively on a windows-11-arm runner: maturin needs
          # an interpreter whose architecture matches the target, so cross-building
          # the abi3 wheel on the x86-64 runner fails ("reports platform win-amd64
          # while the Rust target is aarch64 — Skipping"). The native ARM64 runner
          # (GA on GitHub-hosted public repos) ships an ARM64 Python, so it just works.
          - os: windows-11-arm
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build abi3 wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --features python --out dist
          # Pin the manylinux container so every Linux wheel carries the same ABI
          # floor (GLIBC 2.28, RHEL8 / Ubuntu 20.04-era). Ignored off-Linux. The
          # aarch64 build runs in the container under QEMU emulation.
          manylinux: 2_28
      - name: Build source distribution
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Verify Linux wheel platform tag (auditwheel)
        # auditwheel (the PyPA reference tool) is the authority on the wheel's ABI
        # tag, independent of Kshana. With manylinux pinned to 2_28 the Linux wheel
        # must be tagged manylinux_2_28_<arch>; fail otherwise. `show` inspects the
        # wheel metadata/ELF and works cross-arch on the host runner.
        if: matrix.os == 'ubuntu-latest'
        env:
          ARCH: ${{ matrix.target }}
        run: |
          python -m pip install auditwheel
          for whl in dist/*.whl; do
            echo "== auditwheel show $whl =="
            auditwheel show "$whl"
            auditwheel show "$whl" | grep -q "manylinux_2_28_${ARCH}" \
              || { echo "ERROR: $whl is not tagged manylinux_2_28_${ARCH}"; exit 1; }
          done
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  # Rebuild-and-diff reproducibility check for the wheel on an x86_64 runner: build
  # the abi3 wheel twice from the same checkout and assert the two are byte-identical.
  #
  # HONESTY: byte-level wheel reproducibility is a goal, not a proven invariant of this
  # toolchain. The build pins SOURCE_DATE_EPOCH (the standard knob that strips embedded
  # mtimes from the wheel zip) and builds both wheels in the same pinned manylinux
  # container; if maturin/pyo3 still embed nondeterministic bytes this job FAILS LOUDLY
  # rather than masking it — that is the point. It is informational (continue-on-error)
  # so an as-yet-unconfirmed nondeterminism never blocks a release while the guarantee
  # is being established; flip continue-on-error off once CI confirms it is stably green.
  wheel-repro:
    name: wheel rebuild-and-diff (x86_64, byte-identical)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
    env:
      # Deterministic timestamp for the wheel zip (the canonical reproducible-builds knob).
      SOURCE_DATE_EPOCH: "1700000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheel — pass 1
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: x86_64
          args: --release --features python --out dist1
          manylinux: 2_28
      - name: Build wheel — pass 2
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: x86_64
          args: --release --features python --out dist2
          manylinux: 2_28
      - name: Assert the two wheels are byte-identical
        run: |
          set -euo pipefail
          w1="$(ls dist1/*.whl)"
          w2="$(ls dist2/*.whl)"
          echo "pass 1: $w1"
          echo "pass 2: $w2"
          h1="$(sha256sum "$w1" | awk '{print $1}')"
          h2="$(sha256sum "$w2" | awk '{print $1}')"
          echo "sha256 pass1 = $h1"
          echo "sha256 pass2 = $h2"
          if [ "$h1" != "$h2" ]; then
            echo "::error::wheel is NOT byte-reproducible across rebuilds"
            # Surface exactly which entries differ to make the nondeterminism diagnosable.
            python -m zipfile -l "$w1" > list1.txt
            python -m zipfile -l "$w2" > list2.txt
            diff -u list1.txt list2.txt || true
            cmp -l "$w1" "$w2" | head -40 || true
            exit 1
          fi
          echo "OK: wheel is byte-reproducible ($h1)"

  # Best-effort smoke install on a native ARM64 Linux runner: proves the aarch64
  # wheel installs without building from source. continue-on-error so an
  # unavailable arm runner label never blocks the release.
  arm-install-smoke:
    name: pip install on ARM64 Linux (smoke)
    needs: wheels
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-aarch64
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install the aarch64 wheel without building from source
        run: |
          python -m pip install --only-binary :all: --no-index --find-links dist kshana
          python -c "import kshana, platform; print('kshana imported on', platform.machine())"
