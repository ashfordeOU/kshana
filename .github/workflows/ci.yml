name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to the exact version in rust-toolchain.toml for a reproducible build.
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Toolchain pin guard
        run: ./scripts/check-toolchain.sh
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Reproducibility guard
        run: ./scripts/check-reproducible.sh
      - name: Repository hygiene guard
        run: ./scripts/check-no-attribution.sh
      - name: Version consistency guard
        run: ./scripts/check-version-sync.sh
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75.0
      - run: cargo build --all
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
  test-python-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install maturin and pytest
        run: pip install maturin pytest
      - name: Build the Python wheel
        run: maturin build --features python --out dist
      - name: Install the wheel
        run: pip install --no-index --find-links dist kshana
      - name: Run binding smoke tests
        run: pytest -q tests/python
  test-wasm-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build the WebAssembly module
        run: wasm-pack build --target web --out-dir web/pkg --release -- --features wasm
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run wasm smoke test
        run: node web/smoke.mjs
