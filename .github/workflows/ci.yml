name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    # The umbrella gate runs the full `cargo test --all`, which includes the
    # multi-minute end-to-end validation binaries (agency_lro ~24 min,
    # agency_swarm ~11 min, the P1-P6 paper cross-checks).
    #
    # Healthy steady-state is ~62-79 min. During the v0.25.0 cut this job was cancelled
    # at its cap twice (41c5ea1 at 120, e1a2cb0 at 240) and earlier explanations here
    # blamed cold caches — wrong: the kill logs of every cancelled run name the same
    # orphan process, the tests/property.rs `run_toml` fuzzer, still running hours after
    # everything else finished. Its corpus was read in `read_dir` (filesystem-random)
    # order, so each run drew a different mutation workload — a per-run lottery from
    # minutes to hours on identical code. Fixed at the source: the corpus is now sorted
    # (deterministic workload) and the loop is wall-clock-budgeted — see that test's
    # comment. The 240 cap stays as pure headroom: it costs nothing when healthy, and a
    # cap that clips a passing run reveals nothing (a job cancelled at its cap never
    # reveals its true runtime). No gate below is weakened.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the repository-hygiene guard scans every commit message,
          # not just the shallow tip (default fetch-depth 1 silently blinds the scan).
          fetch-depth: 0
      # Pinned to the exact version in rust-toolchain.toml for a reproducible build.
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Toolchain pin guard
        run: ./scripts/check-toolchain.sh
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Reproducibility guard
        run: ./scripts/check-reproducible.sh
      - name: Repository hygiene guard
        run: ./scripts/check-no-attribution.sh
      - name: Version consistency guard
        run: ./scripts/check-version-sync.sh
      - name: Documentation-coverage ratchet
        run: ./scripts/check-doc-coverage.sh
      - name: SBOM generation guard
        run: ./scripts/gen-sbom.sh > /dev/null
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75.0
      - run: cargo build --all
  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # Install cargo-deny as a prebuilt binary from its GitHub release rather
      # than via EmbarkStudios/cargo-deny-action, which builds a Docker image
      # `FROM rust:...-alpine` on every run and intermittently fails when the
      # Docker Hub registry pull times out ("dial tcp ...: i/o timeout"). The
      # binary install has no Docker Hub dependency. cargo-deny reads
      # Cargo.lock + deny.toml and needs no project compilation.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo-deny
        run: cargo deny check advisories licenses bans sources
  coverage:
    runs-on: ubuntu-latest
    # Source-based LLVM instrumentation runs the same full suite as `check` under
    # coverage counters. Healthy steady-state is ~91-94 min.
    #
    # This job was cancelled at its cap three times during the v0.25.0 cut (180 min on
    # 3076e95 twice, 240 min on e1a2cb0 — the last one even after its iterations were
    # reduced under instrumentation). Every kill log names the same orphan process: the
    # tests/property.rs `run_toml` fuzzer. Its corpus was read in `read_dir`
    # (filesystem-random) order, so each run drew a different mutation workload, and a
    # mutant that stays valid EXECUTES — a byte flip in a cost knob makes it far more
    # expensive than any bundled scenario. That per-run lottery is why sonarcloud.yml
    # once ran the identical tarpaulin workload to success in 93 min on a commit where
    # this job hung twice. Fixed at the source: sorted (deterministic) corpus + a
    # wall-clock budget + a 300-iteration prefix under `cfg(tarpaulin)` — see that
    # test's comment. The 240 cap stays as pure headroom; a job cancelled at its cap
    # never reveals its true runtime.
    #
    # The measurement and the --fail-under 85 floor below are unchanged.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          # The LLVM source-based coverage engine needs llvm-profdata/llvm-cov,
          # shipped by this component.
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Coverage (LLVM engine, enforced line floor)
        # Source-based LLVM instrumentation (the same coverage family as
        # `cargo llvm-cov`), reported as an lcov artifact and gated on a line
        # floor. Generated data tables, the thin CLI entrypoint, the tests
        # themselves, and the web assets are excluded from the measurement.
        # The floor is 85% — above the >=80% target and comfortably under the
        # measured ~96% line coverage on src/ — so it guards against regressions
        # without flaking. SGP4 and the clock modules sit at >=95%.
        run: >
          cargo tarpaulin --engine llvm --out Lcov --output-dir coverage
          --exclude-files 'src/*_data.rs'
          --exclude-files 'src/main.rs'
          --exclude-files 'tests/*'
          --exclude-files 'web/*'
          --timeout 900 --fail-under 85
      - name: Upload lcov report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
  reproducibility-matrix:
    # Prove cross-platform reproducibility on the three tier-1 desktop OSes. Full
    # result JSON is not byte-identical across targets (last-ULP libm divergence),
    # so we assert the reproducibility invariants that ARE platform-independent:
    # the input fingerprint + output shape (tests/cross_platform_golden.rs, exact
    # SHA-256 goldens in tests/golden/), the pinned numerics to 1e-6 (golden.rs),
    # same-process byte-identity (determinism.rs), and the SGP4 states to 2e-5 km
    # against the AIAA reference (sgp4_verification.rs). See docs/REPRODUCIBILITY.md.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - name: Cross-platform reproducibility tests
        run: >
          cargo test
          --test cross_platform_golden
          --test golden
          --test determinism
          --test sgp4_verification
  test-python-bindings:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # Build the wheel with PyO3/maturin-action, which runs maturin inside a
      # manylinux container. This deliberately avoids a raw host `maturin build`
      # + dtolnay/rust-toolchain combination: on the ubuntu-latest runner image
      # that path intermittently fails when rustup tries to install the
      # rustfmt-preview component and collides with the image's pre-installed
      # `~/.cargo/bin/cargo-fmt` ("detected conflict: 'bin/cargo-fmt'"). The
      # container ships its own clean toolchain, so the conflict cannot occur.
      - name: Build the Python wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --features python --out dist
          # Match the release wheel's ABI floor (wheels.yml) so the gating build
          # and the published build use the identical manylinux_2_28 container.
          manylinux: 2_28
      - name: Install test deps
        run: pip install pytest numpy
      - name: Install the wheel
        run: pip install --no-index --find-links dist kshana
      - name: Run binding smoke tests
        run: pytest -q tests/python
  test-wasm-bindings:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build the WebAssembly module
        # --no-opt skips the wasm-opt pass so this CI verification job never has to
        # download binaryen from the GitHub release CDN (a recurring transient
        # failure point). The build is functionally identical; the size-optimized
        # wasm-opt pass is kept for the deployed playground in pages.yml / publish.yml.
        run: wasm-pack build --target web --out-dir web/pkg --release --no-opt -- --features wasm
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run wasm smoke test
        run: node web/smoke.mjs
      - name: Test the share-link codec
        run: node web/share.test.mjs
      - name: Test the chart-download helpers
        run: node web/chartdl.test.mjs
      - name: Test the A/B compare logic
        run: node web/compare.test.mjs
      - name: Test the chart-hover logic
        run: node web/hover.test.mjs
      - name: Test the 3D orbit renderer math
        run: node web/orbit3d.test.mjs
      - name: Test the parameter-sweep helpers
        run: node web/sweep.test.mjs
      - name: Test the guided-knob helpers
        run: node web/guided.test.mjs
      - name: Test the multi-run overlay logic
        run: node web/overlay.test.mjs
      - name: Test the tabbed-output model
        run: node web/tabs.test.mjs
      - name: Test the embed-mode helpers
        run: node web/embed.test.mjs
      - name: Test the HTML-report builder
        run: node web/report.test.mjs
      - name: Test the guided-tour core
        run: node web/tour.test.mjs
  # ---------------------------------------------------------------------------
  # Overlay-registry assurance gates (Phase 0).
  #
  # These two jobs pin the public crate's standalone health independently of the
  # umbrella `check` job: that the kshana library builds + tests on its own (so
  # the registry conformance suite, tests/conformance.rs, always runs and the
  # dispatch seam can never silently drift from registry::ids::all()), and that
  # the library still compiles for the WASM target the registry was designed to
  # stay friendly to (BTreeMap/Cow, no SystemTime::now()). The conformance test
  # itself also runs in the `check` job's `cargo test --all`; this is a focused,
  # faster-failing restatement scoped to the public crate.
  # ---------------------------------------------------------------------------
  public-standalone:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: Swatinem/rust-cache@v2
      - name: Build the public crate standalone
        run: cargo build -p kshana
      # Scope to the crate's unit tests plus the registry dispatch-seam suite. The
      # multi-minute agency/precise-OD validation binaries (agency_lro ~24 min,
      # agency_swarm ~11 min, property, ...) already run in the `check` job's
      # `cargo test --all`; re-running them here overran the focused 30-min budget
      # for zero extra coverage (single crate: `-p kshana` == `--all`), which is
      # what this job's "faster-failing restatement" header promises to avoid.
      - name: Test the public crate (unit tests + registry conformance/dispatch seam)
        run: cargo test -p kshana --lib --test conformance --test external_pack --test registry_golden
  wasm-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build the public crate for wasm32-unknown-unknown
        # Proves the registry/assurance seam stays no_std/WASM-safe. Scoped to
        # --lib: the registry lives in the library, and the crate's native-only
        # binaries (e.g. gen_validation_artifacts) are not WASM targets.
        run: cargo build -p kshana --lib --target wasm32-unknown-unknown
