# Build, verify, and (on release tags) publish the JetBrains IDE plugin (ide/jetbrains/).
#
# - build:   runs on manual dispatch AND on release tags. Kotlin/Gradle project that
#            downloads the IntelliJ Platform SDK; separate from the Rust crate's CI, so
#            it can never block `main`.
# - publish: runs on release tags (or manual dispatch). Publishes to JetBrains
#            Marketplace via `publishPlugin`, gated on the JETBRAINS_MARKETPLACE_TOKEN
#            secret so it is inert until the maintainer creates the listing (first
#            upload is manual/moderated) and adds the token. The plugin version is
#            stamped from the release tag. Developer signing is used when the optional
#            certificate secrets are present; otherwise the upload is Marketplace-signed.
name: JetBrains plugin
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version to publish (e.g. 0.14.2); defaults to the tag"
        required: false
        type: string
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide/jetbrains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build + unit-test + assemble the plugin
        run: ./gradlew test buildPlugin --no-daemon --console=plain
      - name: Upload the plugin distributable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kshana-jetbrains-plugin
          path: ide/jetbrains/build/distributions/*.zip
          if-no-files-found: warn

  publish:
    name: Publish to JetBrains Marketplace
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide/jetbrains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Resolve version
        id: ver
        env:
          REF: ${{ github.ref }}
          INPUT: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT" ]; then v="$INPUT"; else v="${REF#refs/tags/v}"; fi
          echo "v=$v" >> "$GITHUB_OUTPUT"
      - name: Gate on Marketplace token
        id: gate
        env:
          TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "JETBRAINS_MARKETPLACE_TOKEN not set; skipping Marketplace publish"; fi
      - name: Publish (developer-signed if certificate secrets are present)
        if: steps.gate.outputs.go == 'true'
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
          PLUGIN_VERSION: ${{ steps.ver.outputs.v }}
        run: |
          args="-PpluginVersion=$PLUGIN_VERSION --no-daemon --console=plain"
          if [ -z "$CERTIFICATE_CHAIN" ]; then
            echo "No signing certificate set — publishing unsigned (Marketplace will sign)."
            args="$args -x signPlugin"
          fi
          ./gradlew publishPlugin $args
