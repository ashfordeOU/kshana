# Build, verify, and (on release tags) publish the JetBrains IDE plugin (ide/jetbrains/).
#
# - build:   runs on manual dispatch AND on release tags. Kotlin/Gradle project that
#            downloads the IntelliJ Platform SDK; separate from the Rust crate's CI, so
#            it can never block `main`.
# - publish: runs on release tags (or manual dispatch). Publishes to JetBrains
#            Marketplace via `publishPlugin`, gated on the JETBRAINS_MARKETPLACE_TOKEN
#            secret. The plugin versions in LOCKSTEP with the engine: on a release tag
#            the published version is the tag (vX.Y.Z -> X.Y.Z), so the Marketplace
#            version always matches the `kshana` release it targets. A manual dispatch
#            can override via the `version` input; otherwise it falls back to
#            ide/jetbrains/gradle.properties (`pluginVersion`), which is kept equal to
#            the engine version by scripts/check-version-sync.sh. Developer signing is
#            used when the optional certificate secrets are present; otherwise the upload
#            is Marketplace-signed.
name: JetBrains plugin
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override plugin version to publish (else gradle.properties pluginVersion)"
        required: false
        type: string
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ide/jetbrains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build + unit-test + assemble the plugin
        run: |
          set +e
          attempt=1; max=3
          while :; do
            out="$(./gradlew test buildPlugin --no-daemon --console=plain 2>&1)"; rc=$?
            printf '%s\n' "$out"
            if [ "$rc" -eq 0 ]; then break; fi
            # Retry only on transient JetBrains CDN / network resolution failures.
            if [ "$attempt" -lt "$max" ] && printf '%s\n' "$out" | grep -qiE "bad gateway|could not resolve|could not get resource|status code: (429|50[0-9])|gateway time-?out|connection (reset|timed out)|read timed out|timeout"; then
              echo "::warning::transient IntelliJ Platform resolution failure during build (attempt $attempt/$max) - retrying"
              sleep $((attempt * 30))
              attempt=$((attempt + 1))
              continue
            fi
            exit "$rc"
          done
      - name: Upload the plugin distributable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kshana-jetbrains-plugin
          path: ide/jetbrains/build/distributions/*.zip
          if-no-files-found: warn

  publish:
    name: Publish to JetBrains Marketplace
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ide/jetbrains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Resolve plugin version (lockstep with the engine tag)
        id: ver
        env:
          REF: ${{ github.ref }}
          INPUT: ${{ github.event.inputs.version }}
        run: |
          # Lockstep with the engine: a release tag (vX.Y.Z) is the source of truth, so
          # the Marketplace version always matches the kshana release. A manual dispatch
          # may override via the version input; otherwise fall back to gradle.properties
          # (which check-version-sync.sh keeps equal to the engine version).
          if [ -n "$INPUT" ]; then
            v="$INPUT"
          elif printf '%s' "$REF" | grep -q '^refs/tags/v'; then
            v="${REF#refs/tags/v}"
          else
            v="$(grep -E '^pluginVersion' gradle.properties | sed -E 's/.*= *//' | tr -d ' ')"
          fi
          echo "v=$v" >> "$GITHUB_OUTPUT"
      - name: Gate on Marketplace token
        id: gate
        env:
          TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "JETBRAINS_MARKETPLACE_TOKEN not set; skipping Marketplace publish"; fi
      - name: Publish (developer-signed if certificate secrets are present)
        if: steps.gate.outputs.go == 'true'
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
          PLUGIN_VERSION: ${{ steps.ver.outputs.v }}
        run: |
          # Build the gradle arg list as an array so each token is passed intact
          # (no word-splitting/globbing surprises — shellcheck SC2086).
          args=(-PpluginVersion="$PLUGIN_VERSION" --no-daemon --console=plain)
          if [ -z "$CERTIFICATE_CHAIN" ]; then
            echo "No signing certificate set — publishing unsigned (Marketplace will sign)."
            args+=(-x signPlugin)
          fi
          set +e
          attempt=1; max=3
          while :; do
            out="$(./gradlew publishPlugin "${args[@]}" 2>&1)"; rc=$?
            printf '%s\n' "$out"
            if [ "$rc" -eq 0 ]; then break; fi
            # Idempotent: a version already submitted (incl. first-time moderation) is success.
            if printf '%s\n' "$out" | grep -qiE "already.*(exist|upload|present|submitted|contains)|same version|duplicate|status code: 409|moderation|not.*approved|pending"; then
              echo "::notice::plugin v$PLUGIN_VERSION already submitted / pending moderation - treating as success"
              exit 0
            fi
            # Transient JetBrains CDN / network failure resolving the IntelliJ Platform - retry with backoff.
            if [ "$attempt" -lt "$max" ] && printf '%s\n' "$out" | grep -qiE "bad gateway|could not resolve|could not get resource|status code: (429|50[0-9])|gateway time-?out|connection (reset|timed out)|read timed out|timeout"; then
              echo "::warning::transient IntelliJ Platform resolution failure (attempt $attempt/$max) - retrying"
              sleep $((attempt * 30))
              attempt=$((attempt + 1))
              continue
            fi
            exit "$rc"
          done
