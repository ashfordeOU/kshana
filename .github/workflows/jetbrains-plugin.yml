# Build, verify, and (on release tags) publish the JetBrains IDE plugin (ide/jetbrains/).
#
# - build:   runs on manual dispatch AND on release tags. Kotlin/Gradle project that
#            downloads the IntelliJ Platform SDK; separate from the Rust crate's CI, so
#            it can never block `main`.
# - publish: runs on release tags (or manual dispatch). Publishes to JetBrains
#            Marketplace via `publishPlugin`, gated on the JETBRAINS_MARKETPLACE_TOKEN
#            secret. The plugin versions INDEPENDENTLY of the engine (it shells out to
#            the user's `kshana` binary, so it only changes when its own code changes):
#            the published version comes from ide/jetbrains/gradle.properties
#            (`pluginVersion`), NOT the git tag. Bump pluginVersion to ship an update.
#            Developer signing is used when the optional certificate secrets are present;
#            otherwise the upload is Marketplace-signed.
name: JetBrains plugin
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override plugin version to publish (else gradle.properties pluginVersion)"
        required: false
        type: string
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide/jetbrains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build + unit-test + assemble the plugin
        run: ./gradlew test buildPlugin --no-daemon --console=plain
      - name: Upload the plugin distributable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kshana-jetbrains-plugin
          path: ide/jetbrains/build/distributions/*.zip
          if-no-files-found: warn

  publish:
    name: Publish to JetBrains Marketplace
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide/jetbrains
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Resolve plugin version (own version, not the engine tag)
        id: ver
        env:
          INPUT: ${{ github.event.inputs.version }}
        run: |
          v="$(grep -E '^pluginVersion' gradle.properties | sed -E 's/.*= *//' | tr -d ' ')"
          if [ -n "$INPUT" ]; then v="$INPUT"; fi
          echo "v=$v" >> "$GITHUB_OUTPUT"
      - name: Gate on Marketplace token
        id: gate
        env:
          TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "JETBRAINS_MARKETPLACE_TOKEN not set; skipping Marketplace publish"; fi
      - name: Publish (developer-signed if certificate secrets are present)
        if: steps.gate.outputs.go == 'true'
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
          PLUGIN_VERSION: ${{ steps.ver.outputs.v }}
        run: |
          args="-PpluginVersion=$PLUGIN_VERSION --no-daemon --console=plain"
          if [ -z "$CERTIFICATE_CHAIN" ]; then
            echo "No signing certificate set — publishing unsigned (Marketplace will sign)."
            args="$args -x signPlugin"
          fi
          set +e
          out="$(./gradlew publishPlugin $args 2>&1)"; rc=$?
          printf '%s\n' "$out"
          if [ "$rc" -ne 0 ]; then
            # Idempotent: a version already submitted (incl. one still in first-time
            # moderation) is not a failure — it just means there is nothing new to push.
            printf '%s\n' "$out" | grep -qiE "already.*(exist|upload|present|submitted)|same version|duplicate|status code: 409|moderation|not.*approved|pending" \
              && { echo "::notice::plugin v$PLUGIN_VERSION is already submitted / pending moderation — treating as success"; exit 0; }
            exit "$rc"
          fi
