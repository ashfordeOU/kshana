# SPDX-License-Identifier: Apache-2.0
# Publish Kshana to crates.io, PyPI, and npm.
#
# Each job is gated on its registry token: with the token unset the publish step
# is skipped (the job still succeeds), so this workflow is inert until the
# maintainer adds the corresponding secret. Runs when a GitHub release is
# published, or on manual dispatch.
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crates:
    name: crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Gate on token
        id: gate
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish"; fi
      - name: Publish
        if: steps.gate.outputs.go == 'true'
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "$TOKEN"

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python --out dist
      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Gate on token
        id: gate
        env:
          TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "PYPI_API_TOKEN not set; skipping PyPI publish"; fi
      - name: Upload
        if: steps.gate.outputs.go == 'true'
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*

  npm:
    name: npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build module
        run: wasm-pack build --target web --out-dir web/pkg --release -- --features wasm
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Gate on token
        id: gate
        env:
          TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "NPM_TOKEN not set; skipping npm publish"; fi
      - name: Publish
        if: steps.gate.outputs.go == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./web/pkg --access public
