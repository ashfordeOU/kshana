# SPDX-License-Identifier: AGPL-3.0-only
# Publish Kshana to crates.io, PyPI, and npm.
#
# Triggered by pushing a release tag (vX.Y.Z) or by manual dispatch. (The
# `release: published` event is intentionally not used: releases created by the
# Release workflow's GITHUB_TOKEN do not trigger downstream workflows, so that
# trigger would never fire.) Each job is gated on its registry token — with the
# token unset the publish step is skipped and the job still succeeds, so the
# workflow is inert until the maintainer adds the secret. Every publish is
# idempotent: re-running after a version is already live is a no-op success, so a
# partial failure (one registry) can be retried safely without touching the others.
name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crates:
    name: crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Gate on token
        id: gate
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish"; fi
      - name: Publish
        if: steps.gate.outputs.go == 'true'
        env:
          # cargo reads CARGO_REGISTRY_TOKEN from the environment (no deprecated --token).
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          out="$(cargo publish 2>&1)"; rc=$?
          printf '%s\n' "$out"
          if [ "$rc" -ne 0 ]; then
            printf '%s\n' "$out" | grep -qiE "already (exists|uploaded)|already been published|is already uploaded" \
              && { echo "::notice::this version is already on crates.io — treating as success"; exit 0; }
            exit "$rc"
          fi

  crates-mcp:
    name: crates.io (kshana-mcp)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # The MCP server is a standalone, workspace-excluded crate that depends on the
    # published `kshana` crate (`kshana = { path = "../..", version = "0.14" }`), so it
    # must publish AFTER the `crates` job has pushed a matching `kshana` to crates.io.
    needs: crates
    defaults:
      run:
        working-directory: mcp/kshana-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Gate on token
        id: gate
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "CARGO_REGISTRY_TOKEN not set; skipping kshana-mcp publish"; fi
      - name: Publish
        if: steps.gate.outputs.go == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          # Retry briefly: the `kshana` version this depends on may still be propagating
          # through the crates.io sparse index right after the `crates` job published it.
          for attempt in 1 2 3 4 5; do
            out="$(cargo publish 2>&1)"; rc=$?
            printf '%s\n' "$out"
            [ "$rc" -eq 0 ] && exit 0
            printf '%s\n' "$out" | grep -qiE "already (exists|uploaded)|already been published|is already uploaded" \
              && { echo "::notice::this version is already on crates.io — treating as success"; exit 0; }
            printf '%s\n' "$out" | grep -qiE "no matching package named|failed to select a version for the requirement" \
              && { echo "kshana not yet indexed; retrying ($attempt/5)…"; sleep 15; continue; }
            exit "$rc"
          done
          echo "::error::kshana-mcp publish failed — is the matching kshana version on crates.io? (check the kshana = \"0.14\" requirement)"
          exit 1

  pypi:
    name: PyPI (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # Full platform-tag matrix (m37c34cfc): linux x86_64 + aarch64 (manylinux_2_28),
    # macOS arm64 + x86_64, Windows x64 + arm64 — the same matrix wheels.yml verifies.
    # Each wheel uploads with --skip-existing so re-runs and the per-job sdist overlap
    # are safe. fail-fast:false so one platform's runner hiccup never blocks the rest.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest # macos-14 runner is arm64
            target: aarch64
          - os: macos-13 # intel mac
            target: x86_64
          - os: windows-latest
            target: x64
          # Windows ARM64 builds natively on a windows-11-arm runner: maturin needs an
          # interpreter whose architecture matches the target, so the native ARM64 runner
          # (GA on GitHub-hosted public repos) ships an ARM64 Python and just works.
          - os: windows-11-arm
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --features python --out dist
          # Pin the manylinux container so every Linux wheel carries the same ABI floor
          # (GLIBC 2.28). Ignored off-Linux. The aarch64 build runs under QEMU emulation.
          manylinux: 2_28
      - name: Build source distribution
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'x86_64'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Gate on token
        id: gate
        shell: bash
        env:
          TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "PYPI_API_TOKEN not set; skipping PyPI publish"; fi
      - name: Upload
        if: steps.gate.outputs.go == 'true'
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          # --skip-existing makes re-runs (and the per-OS overlap on the sdist) safe.
          command: upload
          args: --skip-existing dist/*

  npm:
    name: npm
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build module
        run: wasm-pack build --target web --out-dir web/pkg --release -- --features wasm
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Gate on token
        id: gate
        env:
          TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "NPM_TOKEN not set; skipping npm publish"; fi
      - name: Publish
        if: steps.gate.outputs.go == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # ./-prefixed path so npm treats it as a directory, not a GitHub shorthand.
        run: |
          set +e
          out="$(npm publish ./web/pkg --access public 2>&1)"; rc=$?
          printf '%s\n' "$out"
          if [ "$rc" -ne 0 ]; then
            printf '%s\n' "$out" | grep -qiE "cannot publish over|previously published|EPUBLISHCONFLICT|cannot modify pre-existing version" \
              && { echo "::notice::this version is already on npm — treating as success"; exit 0; }
            exit "$rc"
          fi
